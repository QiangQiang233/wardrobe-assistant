name: wardrobe_assistant
description: AI穿搭助手 - 服装仓库与智能搭配建议

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.4
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  http: ^1.1.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  image: ^4.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/